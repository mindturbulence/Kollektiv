<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%2300ffa3'/%3E%3Ctext y='.9em' x='50%25' text-anchor='middle' font-family='serif' font-weight='bold' font-size='80' fill='%23000'%3EK%3C/text%3E%3C/svg%3E" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" id="theme-color-meta" content="#020617" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Kollektiv</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Montserrat:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,800&family=JetBrains+Mono:wght@400;500;700;800&family=Space+Grotesk:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Monoton&family=Space+Mono:wght@400;700&display=swap" />
  <link rel="stylesheet" href="https://db.onlinewebfonts.com/c/69dbc1186412d7831b88d8a78a360360?family=DIN+Condensed+Web" />
  <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700,900&f[]=sf-mono@400,500,700&display=swap" />
  <script type="text/javascript">
    // Critical: Load theme immediately to support "use current themes" during integrity check
    (function () {
      try {
        const settings = JSON.parse(localStorage.getItem('kollektivSettingsV4'));
        if (settings) {
          const theme = settings.activeThemeMode === 'light' ? settings.lightTheme : settings.darkTheme;
          if (theme) {
            document.documentElement.setAttribute('data-theme', theme);

            // Simple heuristic for light/dark
            const isLight = ['light', 'cupcake', 'bumblebee', 'emerald', 'corporate', 'retro', 'cyberpunk', 'valentine', 'garden', 'lofi', 'pastel', 'fantasy', 'wireframe', 'cmyk', 'autumn', 'acid', 'lemonade', 'winter', 'nord'].includes(theme);
            if (isLight) {
              document.documentElement.classList.add('is-light-theme');
            }

            // Update theme-color meta
            const meta = document.getElementById('theme-color-meta');
            if (meta) {
              if (theme === 'pipboy') meta.setAttribute('content', '#051105');
              else if (theme === 'MindTurbulence') meta.setAttribute('content', '#0a0a0a');
              else if (theme === 'abyss') meta.setAttribute('content', '#020617');
              else if (isLight) meta.setAttribute('content', '#ffffff');
            }
          }
        }
      } catch (e) { }
    })();
  </script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
